name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Secrets Safely (Literal Mode)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          node -e '
            const fs = require("fs");
            let html = fs.readFileSync("index.html", "utf8");
            html = html.replace(/__GROQ_API_KEY__/g, process.env.GROQ_API_KEY || "");
            html = html.replace(/__CEREBRAS_API_KEY__/g, process.env.CEREBRAS_API_KEY || "");
            html = html.replace(/__APPS_SCRIPT_URL__/g, process.env.APPS_SCRIPT_URL || "");
            html = html.replace(/__APPS_SCRIPT_TOKEN__/g, process.env.APPS_SCRIPT_TOKEN || "");
            html = html.replace(/__ADMIN_PASSWORD__/g, process.env.ADMIN_PASSWORD || "");
            fs.writeFileSync("index.html", html, "utf8");
          '

      - name: Verify injections
        run: |
          grep -q '__GROQ_API_KEY__'     index.html && echo "WARNING: GROQ key not injected"         || echo "✓ GROQ_API_KEY injected"
          grep -q '__CEREBRAS_API_KEY__' index.html && echo "WARNING: CEREBRAS key not injected"     || echo "✓ CEREBRAS_API_KEY injected"
          grep -q '__APPS_SCRIPT_URL__'  index.html && echo "WARNING: APPS_SCRIPT_URL not injected"  || echo "✓ APPS_SCRIPT_URL injected"
          grep -q '__APPS_SCRIPT_TOKEN__' index.html && echo "WARNING: APPS_SCRIPT_TOKEN not injected" || echo "✓ APPS_SCRIPT_TOKEN injected"
          grep -q '__ADMIN_PASSWORD__'   index.html && echo "WARNING: ADMIN_PASSWORD not injected"   || echo "✓ ADMIN_PASSWORD injected"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
