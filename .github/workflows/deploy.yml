name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject GROQ API key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: sed -i "s|__GROQ_API_KEY__|${GROQ_API_KEY}|g" index.html

      - name: Inject Cerebras API key
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: sed -i "s|__CEREBRAS_API_KEY__|${CEREBRAS_API_KEY}|g" index.html

      - name: Inject Apps Script URL
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: sed -i "s|__APPS_SCRIPT_URL__|${APPS_SCRIPT_URL}|g" index.html

      - name: Inject Apps Script Token
        env:
          APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}
        run: sed -i "s|__APPS_SCRIPT_TOKEN__|${APPS_SCRIPT_TOKEN}|g" index.html

      - name: Inject Admin Password
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: sed -i "s|__ADMIN_PASSWORD__|${ADMIN_PASSWORD}|g" index.html

      - name: Verify injections
        run: |
          grep -q '__GROQ_API_KEY__'     index.html && echo "WARNING: GROQ key not injected"         || echo "✓ GROQ_API_KEY injected"
          grep -q '__CEREBRAS_API_KEY__' index.html && echo "WARNING: CEREBRAS key not injected"     || echo "✓ CEREBRAS_API_KEY injected"
          grep -q '__APPS_SCRIPT_URL__'  index.html && echo "WARNING: APPS_SCRIPT_URL not injected"  || echo "✓ APPS_SCRIPT_URL injected"
          grep -q '__APPS_SCRIPT_TOKEN__' index.html && echo "WARNING: APPS_SCRIPT_TOKEN not injected" || echo "✓ APPS_SCRIPT_TOKEN injected"
          grep -q '__ADMIN_PASSWORD__'   index.html && echo "WARNING: ADMIN_PASSWORD not injected"   || echo "✓ ADMIN_PASSWORD injected"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
